<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Smart Gym Mirror - Frontend Demo</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 16px; }
      video { max-width: 480px; border: 1px solid #ccc; }
    </style>
  </head>
  <body>
    <h1>AI Smart Gym Mirror — Demo</h1>
    <p>This demo streams simplified pose frames (landmarks) to the backend WebSocket.</p>
    <label>Session ID: <input id="session" value="demo-session"/></label>
    <button id="start">Start</button>
    <div>
      <video id="video" autoplay playsinline></video>
    </div>
    <script>
      const startBtn = document.getElementById('start');
      const video = document.getElementById('video');
      let ws;

      startBtn.addEventListener('click', async () => {
        const sessionId = document.getElementById('session').value || 'demo-session';
        const wsUrl = `ws://${location.hostname}:8000/api/v1/ws?session_id=${encodeURIComponent(sessionId)}`;
        ws = new WebSocket(wsUrl);
        ws.onopen = () => console.log('WS open');
        ws.onmessage = (ev) => console.log('WS msg', ev.data);

        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const sendFrame = () => {
          if (video.videoWidth === 0) { requestAnimationFrame(sendFrame); return; }
          canvas.width = video.videoWidth; canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          // Simple placeholder: send average color as fake 'landmarks'
          const imageData = ctx.getImageData(0,0,canvas.width,canvas.height).data;
          let r=0,g=0,b=0,c=0;
          for (let i=0;i<imageData.length;i+=4*50){ r+=imageData[i]; g+=imageData[i+1]; b+=imageData[i+2]; c++; }
          const avg = [Math.round(r/c), Math.round(g/c), Math.round(b/c)];
          const payload = { session_id: sessionId, frame_id: Date.now().toString(), ts: new Date().toISOString(), landmarks: avg };
          if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
          setTimeout(sendFrame, 200);
        };
        sendFrame();
      });
    </script>
  </body>
</html>
